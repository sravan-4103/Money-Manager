<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charts – Money Manager</title>
  <meta name="description" content="Visual analytics of your income, expenses, and spending patterns.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <style>
    .charts-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: 28px;
    }
    .legend-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .no-data {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 200px; color: var(--text-muted); font-size: 0.875rem;
    }
    .no-data i { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="container">

      <div class="charts-header">
        <div class="page-header" style="margin-bottom:0">
          <h1 class="page-title">Analytics</h1>
          <p class="page-subtitle">Visualize your financial patterns</p>
        </div>
        <div class="filter-tabs" id="filter-tabs">
          <button class="filter-tab" data-filter="week">This Week</button>
          <button class="filter-tab active" data-filter="month">This Month</button>
          <button class="filter-tab" data-filter="year">This Year</button>
        </div>
      </div>

      <!-- Row 1: Donut + Bar -->
      <div class="charts-grid">

        <!-- Expense by Category (Donut) -->
        <div class="card chart-card">
          <div class="chart-title">Expenses by Category</div>
          <div class="chart-subtitle">Where your money is going</div>
          <div class="chart-container" id="donut-wrap">
            <canvas id="donut-chart"></canvas>
          </div>
          <div class="legend-list" id="donut-legend"></div>
        </div>

        <!-- Income vs Expense (Grouped Bar) -->
        <div class="card chart-card">
          <div class="chart-title">Income vs Expenses</div>
          <div class="chart-subtitle">Last 6 months comparison</div>
          <div class="chart-container" id="bar-wrap">
            <canvas id="bar-chart"></canvas>
          </div>
        </div>

      </div>

      <!-- Row 2: Net Balance Line (full width) -->
      <div class="card chart-card mt-6" style="margin-top:20px">
        <div class="chart-title">Net Balance Trend</div>
        <div class="chart-subtitle">Cumulative income minus expenses per month</div>
        <div class="chart-container-lg">
          <canvas id="line-chart"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('not logged in');
    renderNav('charts');

    // ── Chart.js global defaults ─────────────────────────────────
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'Inter, system-ui, sans-serif';
    Chart.defaults.font.size = 12;

    const PALETTE = [
      '#6366f1','#8b5cf6','#ec4899','#f43f5e','#f59e0b',
      '#10b981','#14b8a6','#38bdf8','#a78bfa','#fb7185'
    ];

    let donutChart, barChart, lineChart;
    let currentFilter = 'month';

    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        loadCharts();
      });
    });

    // ── Donut chart ───────────────────────────────────────────────
    async function loadDonut() {
      const wrap = document.getElementById('donut-wrap');
      const legendEl = document.getElementById('donut-legend');

      try {
        const data = await TransactionAPI.getCategoryBreakdown(currentFilter);

        if (!data.length) {
          wrap.innerHTML = '<div class="no-data"><i class="ri-pie-chart-2-line"></i><span>No expense data</span></div>';
          legendEl.innerHTML = '';
          return;
        }

        if (!wrap.querySelector('canvas')) {
          wrap.innerHTML = '<canvas id="donut-chart"></canvas>';
        }

        const labels = data.map(d => d._id);
        const values = data.map(d => d.total);
        const colors = labels.map((_, i) => PALETTE[i % PALETTE.length]);

        if (donutChart) donutChart.destroy();
        donutChart = new Chart(document.getElementById('donut-chart'), {
          type: 'doughnut',
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: colors,
              borderColor: '#0f1623',
              borderWidth: 3,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.label}: ${formatINR(ctx.raw)}`
                }
              }
            }
          }
        });

        const total = values.reduce((a,b) => a+b, 0);
        legendEl.innerHTML = labels.map((l, i) => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${colors[i]}"></div>
            <span>${l} (${Math.round(values[i]/total*100)}%)</span>
          </div>
        `).join('');
      } catch (err) {
        wrap.innerHTML = '<div class="no-data"><i class="ri-alert-line"></i><span>Failed to load</span></div>';
      }
    }

    // ── Bar chart ─────────────────────────────────────────────────
    async function loadBar() {
      const wrap = document.getElementById('bar-wrap');

      try {
        const raw = await TransactionAPI.getMonthlyTrend();

        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          months.push({ year: d.getFullYear(), month: d.getMonth() + 1, label: MONTHS[d.getMonth()] });
        }

        const incomes  = months.map(m => {
          const f = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'income');
          return f ? f.total : 0;
        });
        const expenses = months.map(m => {
          const f = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'expense');
          return f ? f.total : 0;
        });
        const refunds = months.map(m => {
          const f = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'refund');
          return f ? f.total : 0;
        });

        if (!wrap.querySelector('canvas')) {
          wrap.innerHTML = '<canvas id="bar-chart"></canvas>';
        }

        if (barChart) barChart.destroy();
        barChart = new Chart(document.getElementById('bar-chart'), {
          type: 'bar',
          data: {
            labels: months.map(m => m.label),
            datasets: [
              {
                label: 'Income',
                data: incomes,
                backgroundColor: 'rgba(16,185,129,0.7)',
                borderColor: '#10b981',
                borderWidth: 2,
                borderRadius: 6,
                borderSkipped: false
              },
              {
                label: 'Expense',
                data: expenses,
                backgroundColor: 'rgba(244,63,94,0.7)',
                borderColor: '#f43f5e',
                borderWidth: 2,
                borderRadius: 6,
                borderSkipped: false
              },
              {
                label: 'Refund',
                data: refunds,
                backgroundColor: 'rgba(14, 165, 233, 0.7)',
                borderColor: '#0ea5e9',
                borderWidth: 2,
                borderRadius: 6,
                borderSkipped: false
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { usePointStyle: true, pointStyle: 'circle', padding: 16 }
              },
              tooltip: {
                callbacks: { label: ctx => ` ${ctx.dataset.label}: ${formatINR(ctx.raw)}` }
              }
            },
            scales: {
              x: { grid: { color: 'rgba(255,255,255,0.04)' } },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: {
                  callback: v => '₹' + (v >= 1000 ? (v/1000).toFixed(0)+'K' : v)
                }
              }
            }
          }
        });
      } catch (err) {
        wrap.innerHTML = '<div class="no-data"><i class="ri-alert-line"></i><span>Failed to load</span></div>';
      }
    }

    // ── Line chart ────────────────────────────────────────────────
    async function loadLine() {
      try {
        const raw = await TransactionAPI.getMonthlyTrend();

        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const now = new Date();
        const months = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          months.push({ year: d.getFullYear(), month: d.getMonth() + 1, label: MONTHS[d.getMonth()] });
        }

        let cumulative = 0;
        const balances = months.map(m => {
          const inc = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'income');
          const exp = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'expense');
          const ref = raw.find(r => r._id.year === m.year && r._id.month === m.month && r._id.type === 'refund');
          cumulative += (inc ? inc.total : 0) + (ref ?ref.total : 0) - (exp ? exp.total : 0);
          return cumulative;
        });

        if (lineChart) lineChart.destroy();
        lineChart = new Chart(document.getElementById('line-chart'), {
          type: 'line',
          data: {
            labels: months.map(m => m.label),
            datasets: [{
              label: 'Net Balance',
              data: balances,
              borderColor: '#6366f1',
              backgroundColor: 'rgba(99,102,241,0.08)',
              borderWidth: 2.5,
              pointBackgroundColor: '#6366f1',
              pointBorderColor: '#0f1623',
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 7,
              fill: true,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: { label: ctx => ` Net Balance: ${formatINR(ctx.raw)}` }
              }
            },
            scales: {
              x: { grid: { color: 'rgba(255,255,255,0.04)' } },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: {
                  callback: v => '₹' + (Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'K' : v)
                }
              }
            }
          }
        });
      } catch (err) {
        console.error('Line chart error:', err);
      }
    }

    function loadCharts() {
      loadDonut();
      loadBar();
      loadLine();
    }

    loadCharts();
  </script>
</body>
</html>
